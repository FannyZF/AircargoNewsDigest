{% extends "base.html" %}
{% block title %}新闻搜索 - 空运新闻速递{% endblock %}
{% block content %}
<div class="page-header"><h2>新闻搜索</h2></div>

<div class="toolbar">
    <input type="text" id="search-input" placeholder="搜索关键词..." style="flex:1;min-width:200px;"/>
    <select id="category-filter">
        <option value="">全部分类</option>
        {% for cid, cname in CATEGORY_ORDER %}<option value="{{ cid }}">{{ cname }}</option>{% endfor %}
    </select>
    <select id="region-filter">
        <option value="">全部区域</option>
        {% for r in REGION_ORDER %}<option value="{{ r }}">{{ REGION_LABELS[r] }}</option>{% endfor %}
    </select>
    <button class="btn btn-primary" id="search-btn">搜索</button>
</div>

<div id="results-count" style="color:var(--text-secondary);font-size:13px;margin-bottom:12px;"></div>
<div id="results-container"></div>
<div id="pagination" class="pagination"></div>

{% endblock %}
{% block scripts %}
<script>
let currentPage = 1;

async function doSearch(page) {
    const q = document.getElementById('search-input').value.trim();
    const category = document.getElementById('category-filter').value;
    const region = document.getElementById('region-filter').value;
    currentPage = page;
    const btn = document.getElementById('search-btn');
    btn.innerHTML = '<span class="spinner"></span>';
    btn.disabled = true;
    try {
        const params = new URLSearchParams({q, category, region, page, size: 20});
        const resp = await fetch('/api/search?' + params);
        const data = await resp.json();
        renderResults(data);
    } finally {
        btn.innerHTML = '搜索';
        btn.disabled = false;
    }
}

function renderResults(data) {
    document.getElementById('results-count').textContent = '共 ' + data.total + ' 条结果';
    const container = document.getElementById('results-container');
    if (data.results.length === 0) {
        container.innerHTML = '<div class="empty-state"><p>没有找到匹配的新闻</p></div>';
        document.getElementById('pagination').innerHTML = '';
        return;
    }
    container.innerHTML = data.results.map(r => {
        const catBadges = r.category_labels.map(l => '<span class="badge badge-cat">' + l + '</span>').join('');
        const regionBadges = r.region_list.map(rg => {
            const cls = rg === 'China' ? 'badge-china' : 'badge-region';
            const label = r.region_labels[r.region_list.indexOf(rg)] || rg;
            return '<span class="badge ' + cls + '">' + label + '</span>';
        }).join('');
        const tags = (r.keywords || []).map(k => '<span class="tag">' + k + '</span>').join('');
        return '<div class="card">' +
            '<div class="card-title"><a href="' + r.url + '" target="_blank">' + (r.translated_title || r.title) + '</a></div>' +
            '<div class="card-meta">' +
            '<span class="badge badge-source">' + r.source + '</span>' +
            catBadges + regionBadges +
            '<span>' + (r.published_at || '') + '</span></div>' +
            '<div class="card-summary">' + (r.summary || '') + '</div>' +
            (tags ? '<div class="card-tags">' + tags + '</div>' : '') +
            '</div>';
    }).join('');
    const pg = document.getElementById('pagination');
    let html = '';
    for (let p = 1; p <= data.pages; p++) {
        html += '<button class="' + (p === data.page ? 'active' : '') + '" onclick="doSearch(' + p + ')">' + p + '</button>';
    }
    pg.innerHTML = html;
}

document.getElementById('search-btn').addEventListener('click', function() { doSearch(1); });
document.getElementById('search-input').addEventListener('keydown', function(e) { if (e.key === 'Enter') doSearch(1); });
doSearch(1);
</script>
{% endblock %}
