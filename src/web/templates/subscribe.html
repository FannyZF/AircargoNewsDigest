{% extends "base.html" %}
{% block title %}邮件订阅 - 空运新闻速递{% endblock %}
{% block content %}
<div class="page-header">
    <h2>邮件订阅</h2>
    <div class="subtitle">每日日报自动发送到您的邮箱</div>
</div>

<div class="card" style="max-width:500px;">
    <h3 style="font-size:16px;font-weight:600;margin-bottom:12px;">订阅日报</h3>
    <div style="display:flex;gap:8px;margin-bottom:12px;">
        <input type="email" id="subscribe-email" placeholder="your@email.com" style="flex:1;"/>
        <button class="btn btn-primary" onclick="subscribe()" id="sub-btn">订阅</button>
    </div>
    <div id="sub-msg" style="font-size:13px;"></div>
</div>

<div class="card" style="max-width:500px;margin-top:16px;">
    <h3 style="font-size:16px;font-weight:600;margin-bottom:12px;">退订</h3>
    <div style="display:flex;gap:8px;margin-bottom:12px;">
        <input type="email" id="unsub-email" placeholder="your@email.com" style="flex:1;"/>
        <button class="btn btn-outline" onclick="unsubscribe()" id="unsub-btn">退订</button>
    </div>
    <div id="unsub-msg" style="font-size:13px;"></div>
</div>

<p style="color:var(--text-tertiary);font-size:12px;margin-top:16px;">当前订阅人数: <span id="sub-count">{{ count }}</span> | 每天定时发送</p>

<div class="card" style="max-width:500px;margin-top:16px;">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
        <h3 style="font-size:16px;font-weight:600;">订阅者列表</h3>
        <button class="btn btn-outline btn-sm" onclick="loadSubscribers()">刷新</button>
    </div>
    <div id="subscribers-list" style="font-size:13px;color:var(--text-secondary);">点击刷新查看</div>
</div>
{% endblock %}
{% block scripts %}
<script>
async function subscribe() {
    const email = document.getElementById('subscribe-email').value.trim();
    if (!email) return;
    const btn = document.getElementById('sub-btn');
    const orig = btn.innerHTML;
    btn.innerHTML = '<span class="spinner"></span>';
    btn.disabled = true;
    try {
        const resp = await fetch('/api/subscribe', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({email})
        });
        const data = await resp.json();
        const el = document.getElementById('sub-msg');
        if (resp.ok) { el.innerHTML = '<span style="color:var(--green);">' + data.message + '</span>'; }
        else { el.innerHTML = '<span style="color:var(--red);">' + data.detail + '</span>'; }
    } catch(e) {
        document.getElementById('sub-msg').innerHTML = '<span style="color:var(--red);">网络错误</span>';
    } finally {
        btn.innerHTML = orig;
        btn.disabled = false;
    }
}
async function unsubscribe() {
    const email = document.getElementById('unsub-email').value.trim();
    if (!email) return;
    const btn = document.getElementById('unsub-btn');
    const orig = btn.innerHTML;
    btn.innerHTML = '<span class="spinner"></span>';
    btn.disabled = true;
    try {
        const resp = await fetch('/api/unsubscribe', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({email})
        });
        const data = await resp.json();
        const el = document.getElementById('unsub-msg');
        if (resp.ok) { el.innerHTML = '<span style="color:var(--green);">' + data.message + '</span>'; }
        else { el.innerHTML = '<span style="color:var(--red);">' + data.detail + '</span>'; }
    } catch(e) {
        document.getElementById('unsub-msg').innerHTML = '<span style="color:var(--red);">网络错误</span>';
    } finally {
        btn.innerHTML = orig;
        btn.disabled = false;
    }
}
async function loadSubscribers() {
    try {
        const resp = await fetch('/api/subscribe/count');
        const data = await resp.json();
        document.getElementById('sub-count').textContent = data.count;
        const list = document.getElementById('subscribers-list');
        if (data.subscribers && data.subscribers.length) {
            list.innerHTML = data.subscribers.map(function(s) {
                return '<div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:0.5px solid var(--border);"><span>' + s.email + '</span><span style="color:var(--green);">' + (s.active ? '已激活' : '已停用') + '</span></div>';
            }).join('');
        } else {
            list.innerHTML = '<span style="color:var(--text-tertiary);">暂无订阅者</span>';
        }
    } catch(e) {}
}
loadSubscribers();
</script>
{% endblock %}
